<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 400px;
      max-height: 600px;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .header {
      background: white;
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    h1 {
      margin: 0 0 10px 0;
      font-size: 20px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      display: inline-block;
    }
    
    .status-indicator.connected {
      background: #4caf50;
      animation: pulse 2s infinite;
    }
    
    .status-indicator.disconnected {
      background: #f44336;
    }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    
    .config-section {
      background: white;
      padding: 15px 20px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      font-size: 14px;
      color: #333;
    }
    
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .settings-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0;
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #667eea;
    }
    
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    button {
      flex: 1;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button.secondary {
      background: #6c757d;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status-text {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 5px;
      text-align: center;
    }
    
    .notification-history {
      background: white;
      max-height: 250px;
      overflow-y: auto;
    }
    
    .history-header {
      padding: 15px 20px 10px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .history-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .notification-item {
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .notification-item:hover {
      background: #f8f9fa;
    }
    
    .notification-title {
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }
    
    .notification-message {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .notification-meta {
      font-size: 11px;
      color: #999;
    }
    
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }
    
    .badge {
      background: #ff4444;
      color: white;
      border-radius: 10px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 5px;
    }
    
    .clear-btn {
      background: transparent;
      color: #667eea;
      border: 1px solid #667eea;
      padding: 5px 10px;
      font-size: 12px;
    }
    
    .clear-btn:hover {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <span class="status-indicator" id="statusIndicator"></span>
      Notification Receiver
      <span id="unreadBadge" class="badge" style="display: none;">0</span>
    </h1>
    <div id="statusText" class="status-text">
      Checking connection status...
    </div>
  </div>
  
  <div class="config-section">
    <div class="form-group">
      <label for="serverUrl">Local WebSocket Server:</label>
      <input type="text" id="serverUrl" placeholder="ws://localhost:8080">
    </div>
    
    <div class="form-group">
      <label for="authToken">Auth Token:</label>
      <input type="password" id="authToken" placeholder="Enter authentication token">
    </div>
    
    <div class="settings-group">
      <label for="enabled" style="margin: 0;">Enable Receiving</label>
      <div class="toggle-switch">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </div>
    </div>
    
    <div class="settings-group">
      <label for="soundEnabled" style="margin: 0;">Play Sound</label>
      <div class="toggle-switch">
        <input type="checkbox" id="soundEnabled" checked>
        <span class="slider"></span>
      </div>
    </div>
    
    <div class="settings-group">
      <label for="persistentNotifications" style="margin: 0;">Keep Notifications</label>
      <div class="toggle-switch">
        <input type="checkbox" id="persistentNotifications">
        <span class="slider"></span>
      </div>
    </div>
    
    <div class="button-group">
      <button id="saveBtn">Save Settings</button>
      <button id="testBtn" class="secondary">Test Connection</button>
    </div>
  </div>
  
  <div class="history-header">
    <span class="history-title">Recent Notifications</span>
    <button id="clearBtn" class="clear-btn">Clear All</button>
  </div>
  
  <div class="notification-history" id="notificationHistory">
    <div class="empty-state">No notifications received yet</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
